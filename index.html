<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Map Example</title>
    <!-- my style -->
    <link rel="stylesheet" href="./Style/style.css">
    <!-- leaflet style -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- leaflet js -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- cluster js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

</head>

<body>
    <form id="fetchForm"><input id="fetchData" type="text" title="fetch data" placeholder="Enter your geojson url">
        <select name="Layer tpye" id="layerTyp">
            <option value="Polygon/Line">Polygon/Line</option>
            <option value="Point">Point</option>
        </select>
        <button type="button" id="fetchBtn">Fetch Data</button>
    </form>

    <div id="map"></div>
    <div id="latlng">Hover to get coordinate</div>
    <button id="locate" title="location">🖲️</button>

    <script src="./main/scripts.js" type="module"></script>
</body>

</html>
